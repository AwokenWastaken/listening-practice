<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview with Customs Officer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <img class="map" src="map.jpg" alt="Map">

    <h1>Interview with Customs Officer</h1>

    <audio id="audio" src="interview.mp3"></audio>

    <div class="player">

        <button id="back">↺ 10</button>

        <button id="play" class="play">
            ▶
        </button>

        <button id="forward">10 ↻</button>

        <div class="time">
            <span id="current">0:00</span>
            <input type="range" id="progress" value="0">
            <span id="duration">0:00</span>
        </div>

        <button id="volume">🔊</button>

    </div>


    <div class="buttons">

        <a href="interview.mp3" download>
            ⬇ Download
        </a>

        <button id="share">
            📤 Share
        </button>

    </div>


</div>


<script src="script.js"></script>

</body>
</html>
